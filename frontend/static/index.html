<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NaviChat Login</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="panel auth-panel">
      <div class="auth-header">
        <h1>NaviChat</h1>
        <p>登录后进入聊天页面。</p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="field">
          <label for="login-username">用户名</label>
          <input id="login-username" name="user_name" type="text" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="login-password">密码</label>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button id="login-button" class="btn btn-primary auth-submit" type="submit">登录</button>
      </form>

      <div id="auth-notice" class="notice-box auth-feedback">请输入账号和密码。</div>
      <div id="auth-error" class="error-box auth-feedback hidden"></div>

      <div class="auth-footer">
        <a class="text-link" href="./register.html">没有账号？去注册</a>
      </div>
    </section>
  </main>

  <script src="./auth.js"></script>
</body>
</html>
